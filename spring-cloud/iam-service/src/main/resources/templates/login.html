<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div class="min-h-screen bg-cover bg-center flex items-center justify-center p-4"
     style="background-image: url('https://images.pexels.com/photos/1781709/pexels-photo-1781709.jpeg');">

    <div class="max-w-md w-full bg-white/10 backdrop-blur-lg rounded-xl shadow-xl p-8 border border-white/20">

        <h2 class="text-3xl font-extrabold text-white mb-6 text-center tracking-wide">
            Sign in to your account
        </h2>

        <!-- Error Message -->
        <div th:if="${param.error}"
             class="mb-4 p-3 bg-red-500/20 border border-blue-400 rounded-lg text-blue-200 text-sm text-center">
            <span th:if="${param.error}">Invalid username or password</span>
        </div>

        <!-- Logout Message -->
        <div th:if="${param.logout}"
             class="mb-4 p-3 bg-green-500/20 border border-green-400 rounded-lg text-green-200 text-sm text-center">
            You have been logged out
        </div>

        <!-- Login Form -->
        <form th:action="@{/login}" method="post" class="space-y-5">

            <!-- Email Input -->
            <div>
                <input type="text"
                       name="username"
                       class="w-full px-4 py-3 bg-white/20 text-white border border-white/30 rounded-lg focus:ring-2 focus:ring-red-500 focus:outline-none placeholder-white/70"
                       placeholder="Username"
                       required
                       autofocus />
            </div>

            <!-- Password Input -->
            <div>
                <input type="password"
                       name="password"
                       class="w-full px-4 py-3 bg-white/20 text-white border border-white/30 rounded-lg focus:ring-2 focus:ring-red-500 focus:outline-none placeholder-white/70"
                       placeholder="Password"
                       required />
            </div>

            <!-- Submit Button -->
            <button
                    class="w-full bg-red-600 hover:bg-blue-600 text-white font-semibold py-3 rounded-lg transition-all"
                    type="submit">
                Enter
            </button>
        </form>

        <!-- Register Link -->
        <div class="mt-6 text-center text-sm text-white">
            No Account?
            <a href="#" class="text-red-400 hover:underline font-medium">Register</a>
        </div>
    </div>
</div>
</body>
</html>
