<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TyBot</title>

  <!-- Preload logo image -->
  <link rel="preload"
        as="image"
        href="https://res.cloudinary.com/dkt1t22qc/image/upload/v1742348949/Prestataires_Documents/smj7n1bdlpjsfsotwpco.png">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div class="bg-cover bg-gradient-to-br from-[#7337FF] via-[#000000] to-[#0C7EA8]"
     style="background-image:url(https://res.cloudinary.com/dkt1t22qc/image/upload/v1742348950/Prestataires_Documents/fopt5esl9cgvlcawz1z4.jpg)">

  <div class="h-screen flex justify-center items-center backdrop-brightness-50">
    <div class="flex flex-col items-center space-y-8">

      <!-- Logo -->
      <div>
        <img src="https://res.cloudinary.com/dkt1t22qc/image/upload/v1742348949/Prestataires_Documents/smj7n1bdlpjsfsotwpco.png"
             alt="TyBot Logo"
             class="cursor-pointer">
      </div>

      <!-- Login Form -->
      <div class="rounded-[20px] w-80 p-8 bg-[#310D84]"
           style="box-shadow:-6px 3px 20px 4px #0000007d">

        <h1 class="text-white text-3xl font-bold mb-4">Login</h1>

        <!-- Error message -->
        <div th:if="${param.error}"
             class="mb-4 p-2 bg-red-500 bg-opacity-20 border border-red-400 rounded text-red-200 text-sm">
          Invalid username or password
        </div>

        <!-- Logout message -->
        <div th:if="${param.logout}"
             class="mb-4 p-2 bg-green-500 bg-opacity-20 border border-green-400 rounded text-green-200 text-sm">
          You have been logged out
        </div>

        <!-- Login Form -->
        <form th:action="@{/login}" method="post">
          <div class="space-y-4 mb-4">
            <!-- Username/Email field -->
            <input type="text"
                   name="username"
                   placeholder="Email address"
                   required
                   autofocus
                   class="bg-[#8777BA] w-full p-2.5 rounded-md placeholder:text-gray-300 shadow-md shadow-blue-950 text-white outline-none focus:ring-2 focus:ring-[#228CE0]">

            <!-- Password field -->
            <input type="password"
                   name="password"
                   placeholder="Password"
                   required
                   class="bg-[#8777BA] w-full p-2.5 rounded-md placeholder:text-gray-300 shadow-md shadow-blue-950 text-white outline-none focus:ring-2 focus:ring-[#228CE0]">
          </div>

          <!-- Forget Password link -->
          <div class="mb-4">
            <a href="#" class="text-[#228CE0] text-[10px] ml-2 cursor-pointer hover:underline">
              Forget Password?
            </a>
          </div>

          <!-- Submit button -->
          <div class="flex justify-center mb-4">
            <button type="submit"
                    class="h-10 w-full cursor-pointer text-white rounded-md bg-gradient-to-br from-[#7336FF] to-[#3269FF] shadow-md shadow-blue-950 hover:opacity-90 transition-opacity">
              Sign In
            </button>
          </div>
        </form>

        <!-- Sign up link -->
        <div class="text-gray-300 text-center text-sm">
          Don't have an account?
          <a href="#" class="text-[#228CE0] cursor-pointer hover:underline">
            Sign up
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
