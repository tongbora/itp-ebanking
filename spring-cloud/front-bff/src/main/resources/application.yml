server:
  port: 9990
spring:
  application:
    name: front-bff


  profiles:
    active: dev
  config:
    import: optional:configserver:http://localhost:8888


  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
              lower-case-service-id: true
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin Access-Control-Request-Headers
            - SaveSession
            - TokenRelay=
          routes:
            - id: pipeline
              uri: lb://pipeline
              predicates:
                - Path=/pipeline/**
              filters:
                - RewritePath=/pipeline/(?<segment>.*), /$\{segment}
                - name: CircuitBreaker
                  args:
                    name: pipelineCB
                    fallbackUri: forward:/fallback/pipeline
            - id: frontbff
              uri: http://localhost:3000
              predicates:
                - Path=/**

  #              filters:
  #                - TokenRelay=

  security:
    oauth2:
      client:
        provider:
          itp-frontbff:
            issuer-uri: http://localhost:9090
        registration:
          itp-frontbff:
            provider: itp-frontbff
            client-id: itp-frontbff
            client-secret: qwerqwer
            redirect-uri: http://localhost:9990/login/oauth2/code/itp-frontbff
            authorization-grant-type:
              - authorization_code
            scope:
              - openid # Auto issue access token
              - profile # Get profile
              - email # Get email
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        permitted-number-of-calls-in-half-open-state: 1
        wait-duration-in-open-state: 10000

    instances:
      pipelineCB:
        base-config: default



management:
  endpoints:
    web:
      exposure:
        include: health,metrics,circuitbreakers